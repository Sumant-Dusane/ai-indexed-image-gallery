name: ai_gallery
description: "Offline AI photo search app."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  go_router: ^14.0.0
  photo_manager: ^3.0.0
  workmanager: ^0.5.0
  sqlite3: ^3.2.0
  sqlite_vector: ^0.9.93
  flutter_rust_bridge: 2.11.1
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  rust_lib_ai_gallery:
    path: rust_builder

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  build_runner: ^2.4.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/models/

platforms:
  android:
  ios:
